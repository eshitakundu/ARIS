<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">

  <style>
    .bg { fill:#0B0F14; }
    .llm { fill:#1E293B; stroke:#7C3AED; stroke-width:2; }
    .python { fill:#1E293B; stroke:#F59E0B; stroke-width:2; }
    .source { fill:#1E293B; stroke:#10B981; stroke-width:2; }
    .output { fill:#1E293B; stroke:#3B82F6; stroke-width:2; }
    .core { fill:#111827; stroke:#D4A017; stroke-width:3; }

    .label {
      fill:#F8FAFC;
      font-family:Inter, Arial, sans-serif;
      font-size:16px;
      text-anchor:middle;
      dominant-baseline:middle;
    }

    .title {
      fill:#F8FAFC;
      font-family:Inter, Arial, sans-serif;
      font-size:30px;
      font-weight:700;
    }

    .subtitle {
      fill:#94A3B8;
      font-family:Inter, Arial, sans-serif;
      font-size:14px;
    }

    .line {
      stroke:#475569;
      stroke-width:2;
      fill:none;
    }
  </style>

  <rect width="100%" height="100%" class="bg"></rect>

  <text x="60" y="60" class="title">ARIS Architecture</text>
  <text x="60" y="90" class="subtitle">
    Technology Adoption Intelligence System
  </text>

  <!-- Input -->
  <rect x="560" y="120" width="280" height="60" rx="12" class="core"></rect>
  <text x="700" y="150" class="label">User Input (Tool + Context)</text>

  <!-- Decomposer -->
  <rect x="560" y="240" width="280" height="60" rx="12" class="llm"></rect>
  <text x="700" y="270" class="label">Decomposer Agent</text>

  <!-- Branches Row 1 -->

  <rect x="60" y="390" width="180" height="60" rx="12" class="source"></rect>
  <text x="150" y="420" class="label">Community Sentiment</text>

  <rect x="290" y="390" width="180" height="60" rx="12" class="source"></rect>
  <text x="380" y="420" class="label">Production Adoption</text>

  <rect x="520" y="390" width="180" height="60" rx="12" class="source"></rect>
  <text x="610" y="420" class="label">Alternatives Analysis</text>

  <rect x="750" y="390" width="180" height="60" rx="12" class="python"></rect>
  <text x="840" y="420" class="label">Security Risk</text>

  <rect x="980" y="390" width="180" height="60" rx="12" class="source"></rect>
  <text x="1070" y="420" class="label">Download Trajectory</text>

  <rect x="1210" y="390" width="180" height="60" rx="12" class="python"></rect>
  <text x="1300" y="420" class="label">GitHub Health</text>

  <!-- Merge -->

  <rect x="560" y="550" width="280" height="60" rx="12" class="core"></rect>
  <text x="700" y="580" class="label">Evidence Merge</text>

  <!-- Compression -->

  <rect x="560" y="650" width="280" height="60" rx="12" class="llm"></rect>
  <text x="700" y="680" class="label">Compression Agent</text>

  <!-- Scoring -->

  <rect x="560" y="750" width="280" height="60" rx="12" class="python"></rect>
  <text x="700" y="780" class="label">Deterministic Scoring Engine</text>

  <!-- Output -->

  <rect x="980" y="750" width="280" height="60" rx="12" class="output"></rect>
  <text x="1120" y="780" class="label">Email + PDF Brief</text>

  <!-- Lines -->

  <line x1="700" y1="180" x2="700" y2="240" class="line"></line>

  <line x1="700" y1="300" x2="150" y2="390" class="line"></line>
  <line x1="700" y1="300" x2="380" y2="390" class="line"></line>
  <line x1="700" y1="300" x2="610" y2="390" class="line"></line>
  <line x1="700" y1="300" x2="840" y2="390" class="line"></line>
  <line x1="700" y1="300" x2="1070" y2="390" class="line"></line>
  <line x1="700" y1="300" x2="1300" y2="390" class="line"></line>

  <line x1="150" y1="450" x2="700" y2="550" class="line"></line>
  <line x1="380" y1="450" x2="700" y2="550" class="line"></line>
  <line x1="610" y1="450" x2="700" y2="550" class="line"></line>
  <line x1="840" y1="450" x2="700" y2="550" class="line"></line>
  <line x1="1070" y1="450" x2="700" y2="550" class="line"></line>
  <line x1="1300" y1="450" x2="700" y2="550" class="line"></line>

  <line x1="700" y1="610" x2="700" y2="650" class="line"></line>
  <line x1="700" y1="710" x2="700" y2="750" class="line"></line>
  <line x1="840" y1="780" x2="980" y2="780" class="line"></line>

</svg>