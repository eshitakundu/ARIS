<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 820" width="1480" height="820" font-family="'DejaVu Sans',sans-serif">
  <defs>
    <radialGradient id="bgglow" cx="0.5" cy="0" r="0.8"><stop offset="0" stop-color="#1A1408" stop-opacity="0.7"/><stop offset="1" stop-color="#0A0E14" stop-opacity="0"/></radialGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#52627A"/>
    </marker>
    <marker id="arrowg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8A6A1E"/>
    </marker>
  </defs>
  <rect width="1480" height="820" fill="#0A0E14"/>
  <rect width="1480" height="420" fill="url(#bgglow)"/>
  <text x="34" y="38" fill="#E3A92C" font-size="15" font-weight="700" letter-spacing="3">ARIS PIPELINE</text>
  <text x="225" y="38" fill="#5C6B7D" font-size="13" letter-spacing="1.5">DIRECTED ACYCLIC GRAPH &#8212; LLM EXTRACTS, PYTHON COMPUTES</text>

  <!-- ===== connectors first (under boxes) ===== -->
  <!-- input -> decomposer -->
  <line x1="182" y1="410" x2="213" y2="410" stroke="#52627A" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- decomposer -> 6 branches (fan out from 392,410) -->
  <g stroke="#3A4757" stroke-width="1.3" fill="none" opacity="0.95">
    <path d="M392 410 C 412 145, 416 145, 430 145" marker-end="url(#arrow)"/>
    <path d="M392 410 C 412 251, 416 251, 430 251" marker-end="url(#arrow)"/>
    <path d="M392 410 C 412 357, 416 357, 430 357" marker-end="url(#arrow)"/>
    <path d="M392 410 C 412 463, 416 463, 430 463" marker-end="url(#arrowg)" stroke="#6E571F"/>
    <path d="M392 410 C 412 569, 416 569, 430 569" marker-end="url(#arrow)"/>
    <path d="M392 410 C 412 675, 416 675, 430 675" marker-end="url(#arrowg)" stroke="#6E571F"/>
  </g>
  <!-- 6 branches -> compress (converge to 735,410) -->
  <g stroke="#3A4757" stroke-width="1.3" fill="none" opacity="0.95">
    <path d="M685 145 C 712 145, 716 410, 733 410" marker-end="url(#arrow)"/>
    <path d="M685 251 C 712 251, 716 410, 733 410" marker-end="url(#arrow)"/>
    <path d="M685 357 C 712 357, 716 410, 733 410" marker-end="url(#arrow)"/>
    <path d="M685 463 C 712 463, 716 410, 733 410" marker-end="url(#arrow)"/>
    <path d="M685 569 C 712 569, 716 410, 733 410" marker-end="url(#arrow)"/>
    <path d="M685 675 C 712 675, 716 410, 733 410" marker-end="url(#arrow)"/>
  </g>
  <!-- compress -> score -> synth -> deliver -->
  <line x1="887" y1="410" x2="933" y2="410" stroke="#52627A" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="1087" y1="410" x2="1133" y2="410" stroke="#52627A" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="1287" y1="410" x2="1318" y2="410" stroke="#52627A" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ===== stage boxes ===== -->
  <!-- Input -->
  <g>
    <rect x="30" y="362" width="152" height="96" rx="12" fill="#11161F" stroke="#2A3340" stroke-width="1.4"/>
    <rect x="30" y="362" width="4" height="96" rx="2" fill="#52627A"/>
    <text x="48" y="400" fill="#F4F7FB" font-size="15" font-weight="700">User Input</text>
    <text x="48" y="422" fill="#8B9AAC" font-size="11">tool name +</text>
    <text x="48" y="438" fill="#8B9AAC" font-size="11">eval context + repo</text>
  </g>
  <!-- Decomposer -->
  <g>
    <rect x="213" y="350" width="179" height="120" rx="12" fill="#11161F" stroke="#3A6FD0" stroke-width="1.5"/>
    <rect x="213" y="350" width="4" height="120" rx="2" fill="#3A6FD0"/>
    <text x="231" y="388" fill="#F4F7FB" font-size="15" font-weight="700">Decomposer</text>
    <text x="231" y="410" fill="#8B9AAC" font-size="11">agent &#183; resolves repo,</text>
    <text x="231" y="426" fill="#8B9AAC" font-size="11">registry, queries</text>
    <text x="231" y="450" fill="#3A6FD0" font-size="10.5" font-weight="700">+ validate_queries skill</text>
  </g>

  <!-- branch boxes -->
  <!-- helper visual: title + sub, colored by processor -->
  <!-- 1 Community (LLM/blue) -->
  <g>
    <rect x="430" y="102" width="255" height="86" rx="11" fill="#11161F" stroke="#3A6FD0" stroke-width="1.4"/>
    <rect x="430" y="102" width="4" height="86" rx="2" fill="#3A6FD0"/>
    <text x="448" y="136" fill="#F4F7FB" font-size="14" font-weight="700">Community Sentiment</text>
    <text x="448" y="160" fill="#8B9AAC" font-size="11">Tavily search &#8594; LLM</text>
    <text x="448" y="176" fill="#5C6B7D" font-size="10">friction &amp; enthusiasm signals</text>
  </g>
  <!-- 2 Production (LLM) -->
  <g>
    <rect x="430" y="208" width="255" height="86" rx="11" fill="#11161F" stroke="#3A6FD0" stroke-width="1.4"/>
    <rect x="430" y="208" width="4" height="86" rx="2" fill="#3A6FD0"/>
    <text x="448" y="242" fill="#F4F7FB" font-size="14" font-weight="700">Production Adoption</text>
    <text x="448" y="266" fill="#8B9AAC" font-size="11">Tavily search &#8594; LLM</text>
    <text x="448" y="282" fill="#5C6B7D" font-size="10">named enterprises, scale</text>
  </g>
  <!-- 3 Alternatives (LLM) -->
  <g>
    <rect x="430" y="314" width="255" height="86" rx="11" fill="#11161F" stroke="#3A6FD0" stroke-width="1.4"/>
    <rect x="430" y="314" width="4" height="86" rx="2" fill="#3A6FD0"/>
    <text x="448" y="348" fill="#F4F7FB" font-size="14" font-weight="700">Alternatives</text>
    <text x="448" y="372" fill="#8B9AAC" font-size="11">Tavily search &#8594; LLM</text>
    <text x="448" y="388" fill="#5C6B7D" font-size="10">migrations, comparisons</text>
  </g>
  <!-- 4 Security (Python/gold) -->
  <g>
    <rect x="430" y="420" width="255" height="86" rx="11" fill="#11161F" stroke="#E3A92C" stroke-width="1.5"/>
    <rect x="430" y="420" width="4" height="86" rx="2" fill="#E3A92C"/>
    <text x="448" y="454" fill="#F4F7FB" font-size="14" font-weight="700">Security Risk</text>
    <text x="448" y="478" fill="#E3A92C" font-size="11">OSV API &#8594; Python</text>
    <text x="448" y="494" fill="#5C6B7D" font-size="10">unpatched CVEs only</text>
  </g>
  <!-- 5 Trajectory (LLM) -->
  <g>
    <rect x="430" y="526" width="255" height="86" rx="11" fill="#11161F" stroke="#3A6FD0" stroke-width="1.4"/>
    <rect x="430" y="526" width="4" height="86" rx="2" fill="#3A6FD0"/>
    <text x="448" y="560" fill="#F4F7FB" font-size="14" font-weight="700">Download Trajectory</text>
    <text x="448" y="584" fill="#8B9AAC" font-size="11">PyPI &#183; npm &#8594; LLM</text>
    <text x="448" y="600" fill="#5C6B7D" font-size="10">velocity: accel / stable / decline</text>
  </g>
  <!-- 6 GitHub Health (Python/gold) -->
  <g>
    <rect x="430" y="632" width="255" height="86" rx="11" fill="#11161F" stroke="#E3A92C" stroke-width="1.5"/>
    <rect x="430" y="632" width="4" height="86" rx="2" fill="#E3A92C"/>
    <text x="448" y="666" fill="#F4F7FB" font-size="14" font-weight="700">GitHub Health</text>
    <text x="448" y="690" fill="#E3A92C" font-size="11">GitHub MCP &#8594; Python</text>
    <text x="448" y="706" fill="#5C6B7D" font-size="10">velocity, bus factor, cadence</text>
  </g>

  <!-- Compress -->
  <g>
    <rect x="735" y="356" width="152" height="108" rx="12" fill="#11161F" stroke="#3A6FD0" stroke-width="1.5"/>
    <rect x="735" y="356" width="4" height="108" rx="2" fill="#3A6FD0"/>
    <text x="753" y="392" fill="#F4F7FB" font-size="14.5" font-weight="700">Compression</text>
    <text x="753" y="414" fill="#8B9AAC" font-size="11">agent &#183; dedup,</text>
    <text x="753" y="430" fill="#8B9AAC" font-size="11">weight by source,</text>
    <text x="753" y="446" fill="#8B9AAC" font-size="11">flag contradictions</text>
  </g>
  <!-- Score -->
  <g>
    <rect x="935" y="356" width="152" height="108" rx="12" fill="#11161F" stroke="#E3A92C" stroke-width="1.6"/>
    <rect x="935" y="356" width="4" height="108" rx="2" fill="#E3A92C"/>
    <text x="953" y="392" fill="#F4F7FB" font-size="14.5" font-weight="700">Scoring</text>
    <text x="953" y="414" fill="#E3A92C" font-size="11">Python &#183; weighted,</text>
    <text x="953" y="430" fill="#8B9AAC" font-size="11">security veto,</text>
    <text x="953" y="446" fill="#8B9AAC" font-size="11">confidence</text>
  </g>
  <!-- Synth -->
  <g>
    <rect x="1135" y="356" width="152" height="108" rx="12" fill="#11161F" stroke="#3A6FD0" stroke-width="1.5"/>
    <rect x="1135" y="356" width="4" height="108" rx="2" fill="#3A6FD0"/>
    <text x="1153" y="392" fill="#F4F7FB" font-size="14.5" font-weight="700">Synthesizer</text>
    <text x="1153" y="414" fill="#8B9AAC" font-size="11">LLM &#183; writes the</text>
    <text x="1153" y="430" fill="#8B9AAC" font-size="11">brief from scores</text>
    <text x="1153" y="446" fill="#5C6B7D" font-size="10">numbers passed through</text>
  </g>
  <!-- Deliver -->
  <g>
    <rect x="1320" y="356" width="150" height="108" rx="12" fill="#11161F" stroke="#E3A92C" stroke-width="1.6"/>
    <rect x="1320" y="356" width="4" height="108" rx="2" fill="#E3A92C"/>
    <text x="1338" y="392" fill="#F4F7FB" font-size="14.5" font-weight="700">Delivery</text>
    <text x="1338" y="416" fill="#8B9AAC" font-size="11.5">&#9993;&#160; Email (HTML)</text>
    <text x="1338" y="436" fill="#8B9AAC" font-size="11.5">&#9636;&#160; PDF brief (A4)</text>
  </g>

  <!-- legend -->
  <g>
    <rect x="34" y="780" width="13" height="13" rx="3" fill="#11161F" stroke="#3A6FD0" stroke-width="1.5"/>
    <text x="54" y="791" fill="#8B9AAC" font-size="12">LLM / agent &#8212; unstructured &#8594; structured</text>
    <rect x="360" y="780" width="13" height="13" rx="3" fill="#11161F" stroke="#E3A92C" stroke-width="1.6"/>
    <text x="380" y="791" fill="#8B9AAC" font-size="12">Deterministic Python &#8212; all scoring &amp; counting</text>
    <text x="760" y="791" fill="#5C6B7D" font-size="12">Shared errorHandler on every branch &#183; retries &amp; graceful degradation</text>
  </g>
</svg>
